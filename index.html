<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroLuck6 | Ultra Premium Experience</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --gold: #FFD700;
            --premium-gold: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --accent-color: #FFD700;
            --glass-bg: rgba(10, 14, 26, 0.9);
        }

        /* Tüm ekranlarda tam sayfa garantisi */
        * { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #05070A;
            overflow: hidden; /* Kaydırmayı engeller, her şey ekrana sığar */
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            color: white;
            text-align: center;
        }

        /* Arka Plan Zodiac Wheel - Ölçeklendirme Düzeltildi */
        .zodiac-wheel {
            position: fixed;
            width: 120vmin; /* Ekranın en küçük boyutuna göre oranlanır */
            height: 120vmin;
            background: url('https://raw.githubusercontent.com/yigitsener/zodiac-assets/main/zodiac-wheel-gold.png') no-repeat center;
            background-size: contain;
            opacity: 0.1;
            z-index: -1;
            animation: rotateWheel 180s linear infinite;
        }

        @keyframes rotateWheel {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Ana Panel - Mobilde geniş, Masaüstünde kontrollü */
        .container {
            width: 92%;
            max-width: 550px;
            height: auto;
            max-height: 95vh;
            padding: 40px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 40px;
            box-shadow: 0 0 80px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .logo {
            width: clamp(160px, 40vw, 240px); /* Mobilde 160px, Masaüstünde max 240px */
            margin: 0 auto;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
        }

        h1 {
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 800;
            background: var(--premium-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Burç Seçme Alanı - Genişlik Optimize Edildi */
        .select-wrapper {
            width: 260px;
            max-width: 80%;
            margin: 0 auto;
        }

        select {
            width: 100%;
            padding: 14px;
            border-radius: 20px;
            border: 2px solid var(--accent-color);
            background: #000;
            color: #FFF;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-align-last: center;
        }

        /* Kozmik Buton */
        button {
            width: fit-content;
            margin: 0 auto;
            padding: 16px 32px;
            border: none;
            border-radius: 50px;
            background: var(--premium-gold);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { transform: scale(0.95); }

        /* Toplar - Tek Sıra ve Ölçeklenebilir */
        #balls-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            min-height: 70px;
        }

        .ball {
            width: clamp(45px, 12vw, 65px);
            height: clamp(45px, 12vw, 65px);
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #FFF, var(--accent-color) 60%, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: clamp(16px, 4vw, 22px);
            color: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .social {
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social a {
            font-size: 28px;
            margin: 0 20px;
            color: var(--gold);
            transition: 0.3s;
        }

        /* Mobil İçin İnce Ayar */
        @media (max-height: 700px) {
            .container { padding: 20px; gap: 10px; }
            .logo { width: 140px; }
        }
    </style>
</head>
<body>

<div class="zodiac-wheel"></div>

<div class="container">
    <img src="logo.png" class="logo" alt="Logo">
    <h1>AstroLuck6</h1>

    <div class="select-wrapper">
        <select id="zodiac" onchange="updateTheme()">
            <option value="" disabled selected>Burcunu Seç</option>
            <option value="aries">Koç</option>
            <option value="taurus">Boğa</option>
            <option value="gemini">İkizler</option>
            <option value="cancer">Yengeç</option>
            <option value="leo">Aslan</option>
            <option value="virgo">Başak</option>
            <option value="libra">Terazi</option>
            <option value="scorpio">Akrep</option>
            <option value="sagittarius">Yay</option>
            <option value="capricorn">Oğlak</option>
            <option value="aquarius">Kova</option>
            <option value="pisces">Balık</option>
        </select>
    </div>

    <button onclick="generateNumbers()">Kozmik Sayıları Göster</button>

    <div id="balls-container"></div>

    <div class="social">
        <a href="https://www.instagram.com/astroluck.6/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/profile.php?id=61588426601694&sk=followers" target="_blank"><i class="fab fa-facebook"></i></a>
    </div>
</div>

<script>
const colorPalette = {
    aries: "#FF4136", taurus: "#2ECC40", gemini: "#FFDC00", cancer: "#DDDDDD",
    leo: "#FF851B", virgo: "#85144b", libra: "#F012BE", scorpio: "#FF0000",
    sagittarius: "#B10DC9", capricorn: "#3D9970", aquarius: "#7FDBFF", pisces: "#39CCCC"
};

function updateTheme() {
    const zodiac = document.getElementById("zodiac").value;
    if (zodiac) document.documentElement.style.setProperty('--accent-color', colorPalette[zodiac]);
}

function generateNumbers(){
    const zodiac = document.getElementById("zodiac").value;
    if(!zodiac) return alert("Lütfen burç seçin!");
    
    const container = document.getElementById("balls-container");
    container.innerHTML = "";
    
    let numbers = new Set();
    while(numbers.size < 6) numbers.add(Math.floor(Math.random() * 49) + 1);
    
    Array.from(numbers).sort((a,b)=>a-b).forEach((n, i) => {
        setTimeout(() => {
            let b = document.createElement("div");
            b.className = "ball";
            b.textContent = n;
            container.appendChild(b);
        }, i * 120);
    });
}
</script>

</body>
</html>
