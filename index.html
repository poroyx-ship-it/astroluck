<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroLuck6 | Kozmik Sayıların Sırrı</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #f0cc7a;
            --gold-dark: #8a6020;
            --deep: #0d0a1a;
            --mid: #140e2a;
            --surface: #1a1433;
            --border: rgba(201,168,76,0.2);
            --purple: #6c4fd4;
            --purple-light: #c4a8ff;
            --text-muted: #7a6b9a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--deep);
            font-family: 'Raleway', sans-serif;
            color: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* STAR FIELD */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
        }
        @keyframes twinkle {
            0%, 100% { opacity: var(--min-op, 0.1); transform: scale(1); }
            50% { opacity: var(--max-op, 0.8); transform: scale(1.3); }
        }

        /* NEBULA GLOW */
        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }
        .nebula-1 {
            width: 500px; height: 400px;
            background: radial-gradient(ellipse, rgba(108,79,212,0.18) 0%, transparent 70%);
            top: -100px; left: -100px;
        }
        .nebula-2 {
            width: 400px; height: 400px;
            background: radial-gradient(ellipse, rgba(201,168,76,0.1) 0%, transparent 70%);
            bottom: -80px; right: -80px;
        }
        .nebula-3 {
            width: 300px; height: 300px;
            background: radial-gradient(ellipse, rgba(108,79,212,0.12) 0%, transparent 70%);
            bottom: 100px; left: 50px;
        }

        /* ZODIAC WHEEL */
        .wheel-wrap {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
            pointer-events: none;
        }
        .zodiac-wheel {
            width: min(110vmin, 700px);
            height: min(110vmin, 700px);
            background: url('https://raw.githubusercontent.com/yigitsener/zodiac-assets/main/zodiac-wheel-gold.png') no-repeat center / contain;
            opacity: 0.055;
            animation: rotateWheel 180s linear infinite;
        }
        @keyframes rotateWheel {
            to { transform: rotate(360deg); }
        }

        /* MAIN CARD */
        .card {
            position: relative;
            z-index: 10;
            width: min(440px, 92vw);
            background: rgba(13, 10, 26, 0.88);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: clamp(28px, 5vh, 44px) clamp(24px, 5vw, 40px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(40px);
            box-shadow:
                0 0 0 1px rgba(201,168,76,0.06),
                0 40px 80px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(201,168,76,0.15);
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* CORNER DECORATIONS */
        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 40px; height: 40px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.4;
        }
        .card::before {
            top: 16px; left: 16px;
            border-width: 1px 0 0 1px;
            border-radius: 8px 0 0 0;
        }
        .card::after {
            bottom: 16px; right: 16px;
            border-width: 0 1px 1px 0;
            border-radius: 0 0 8px 0;
        }

        /* HEADER */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .logo-wrap {
            position: relative;
            display: inline-block;
        }
        .logo-wrap img {
            width: clamp(150px, 30vw, 200px);
            filter: drop-shadow(0 0 18px rgba(201,168,76,0.35));
            display: block;
        }
        .app-name {
            font-family: 'Cinzel', serif;
            font-size: clamp(20px, 4vw, 26px);
            font-weight: 900;
            letter-spacing: 0.18em;
            background: linear-gradient(135deg, #c9a84c 0%, #f0cc7a 40%, #c9a84c 70%, #8a6020 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
        }
        .tagline {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* DATE PILL */
        .date-pill {
            background: var(--surface);
            border: 1px solid rgba(201,168,76,0.18);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.06em;
        }
        .date-pill span { color: var(--gold); font-weight: 500; }

        /* DIVIDER */
        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.25), transparent);
        }
        .divider-icon {
            font-size: 14px;
            color: var(--gold);
            opacity: 0.6;
        }

        /* CUSTOM DROPDOWN */
        .dropdown {
            width: 100%;
            position: relative;
            user-select: none;
        }
        .dropdown-selected {
            width: 100%;
            padding: 14px 20px;
            border-radius: 16px;
            border: 1px solid rgba(201,168,76,0.3);
            background: var(--surface);
            color: #fff;
            font-size: 15px;
            font-family: 'Raleway', sans-serif;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .dropdown-selected:hover, .dropdown.open .dropdown-selected {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
        }
        .dropdown-arrow {
            color: var(--gold);
            font-size: 12px;
            transition: transform 0.3s;
            margin-left: auto;
        }
        .dropdown.open .dropdown-arrow { transform: rotate(180deg); }
        .dropdown-list {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            background: #14102a;
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 16px;
            overflow: hidden;
            z-index: 100;
            display: none;
            box-shadow: 0 16px 40px rgba(0,0,0,0.7);
            animation: dropIn 0.18s ease both;
        }
        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .dropdown.open .dropdown-list { display: block; }
        .dropdown-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 6px;
            gap: 2px;
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Raleway', sans-serif;
            color: #c4b0e8;
            transition: background 0.15s, color 0.15s;
        }
        .dropdown-item:hover {
            background: rgba(201,168,76,0.1);
            color: var(--gold-light);
        }
        .dropdown-item.selected {
            background: rgba(108,79,212,0.25);
            color: var(--gold);
        }
        .dropdown-item .sign-sym {
            font-size: 16px;
            width: 22px;
            text-align: center;
        }

        /* BUTTON */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #8a6020 0%, #c9a84c 30%, #f0cc7a 50%, #c9a84c 70%, #8a6020 100%);
            background-size: 200% auto;
            color: #0d0a1a;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-position 0.4s, transform 0.15s, box-shadow 0.3s;
            box-shadow: 0 4px 24px rgba(201,168,76,0.25);
        }
        .btn:hover {
            background-position: right center;
            box-shadow: 0 6px 32px rgba(201,168,76,0.4);
        }
        .btn:active { transform: scale(0.97); }

        /* BALLS */
        .balls-section {
            width: 100%;
            min-height: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .balls-label {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            display: none;
        }
        .balls-label.show { display: block; }
        #balls-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(6px, 2vw, 12px);
            flex-wrap: nowrap;
        }
        .ball {
            width: clamp(44px, 11vw, 60px);
            height: clamp(44px, 11vw, 60px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            font-size: clamp(14px, 3.5vw, 18px);
            color: #0d0a1a;
            position: relative;
            animation: ballPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        .ball::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.55) 0%, transparent 55%);
            z-index: 1;
        }
        .ball span { position: relative; z-index: 2; }
        .ball-bg {
            background: radial-gradient(circle at 40% 35%, #f0cc7a 0%, #c9a84c 45%, #7a4e10 100%);
            box-shadow: 0 4px 16px rgba(201,168,76,0.5), inset 0 -2px 4px rgba(0,0,0,0.3);
        }
        .ball-bg.special {
            background: radial-gradient(circle at 40% 35%, #e8c0ff 0%, #9a6ee0 45%, #3d1a80 100%);
            box-shadow: 0 4px 16px rgba(154,110,224,0.6), inset 0 -2px 4px rgba(0,0,0,0.3);
        }
        .ball-bg.special span { color: #fff; }
        @keyframes ballPop {
            0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
            80%  { transform: scale(1.08) rotate(3deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* COMMENT */
        #horoscope-comment {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid rgba(201,168,76,0.12);
            border-radius: 14px;
            color: var(--gold-light);
            font-size: 12.5px;
            font-style: italic;
            line-height: 1.65;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease both;
        }
        #horoscope-comment.show { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* SOCIAL */
        .social {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid rgba(201,168,76,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 16px;
            text-decoration: none;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
        }
        .social-link:hover {
            border-color: var(--gold);
            box-shadow: 0 0 16px rgba(201,168,76,0.3);
            transform: translateY(-2px);
        }
        .social-link svg { width: 16px; height: 16px; fill: currentColor; }

        /* APP PROMO BADGE */
        .app-badge {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-align: center;
            opacity: 0.7;
        }
        .app-badge span { color: var(--gold); }

        /* RESPONSIVE: short screens */
        @media (max-height: 680px) {
            .card { gap: 14px; padding: 20px 24px; }
            .app-name { font-size: 18px; }
        }
    </style>
</head>

<script>
// STAR FIELD
(function() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.2 + 0.4;
        s.style.cssText = `
            width:${size}px; height:${size}px;
            top:${Math.random()*100}%;
            left:${Math.random()*100}%;
            --d:${(Math.random()*3+2).toFixed(1)}s;
            --delay:-${(Math.random()*4).toFixed(1)}s;
            --min-op:${(Math.random()*0.15+0.05).toFixed(2)};
            --max-op:${(Math.random()*0.5+0.4).toFixed(2)};
        `;
        container.appendChild(s);
    }
})();

// DATE

    document.getElementById('date-pill').innerHTML =
        `<span>${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}</span>`;
})();

const signColors = {

    cancer: '#a8c8e0', leo: '#f08030', virgo: '#903060',

};

const comments = {

// Make'teki split listesiyle birebir aynı küçük harfli isimler
const makeNames = {

    taurus: 'boğa',

    leo: 'aslan',

};

let selectedZodiac = '';
let selectedName = '';

function toggleDropdown() {
    document.getElementById('dropdown').classList.toggle('open');
}

document.addEventListener('click', function(e) {
    const dd = document.getElementById('dropdown');
    if (!dd.contains(e.target)) dd.classList.remove('open');
});

function selectSign(value, sym, name) {
    selectedZodiac = value;
    selectedName = name;
    document.getElementById('selected-label').textContent = sym + '  ' + name;
    document.getElementById('dropdown').classList.remove('open');
    document.querySelectorAll('.dropdown-item').forEach(el => el.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    updateTheme();
}

function updateTheme() {
    if (signColors[selectedZodiac]) {
        const c = signColors[selectedZodiac];
        document.querySelector('.card').style.setProperty('--border', c + '44');
        document.querySelector('.card').style.boxShadow =
            `0 0 0 1px ${c}18, 0 40px 80px rgba(0,0,0,0.7), inset 0 1px 0 ${c}33`;
    }
}

function generateNumbers() {
    const container = document.getElementById('balls-container');
    const commentBox = document.getElementById('horoscope-comment');
    const label = document.getElementById('balls-label');

    if (!selectedZodiac) {
        const sel = document.getElementById('dropdown-selected');
        sel.style.borderColor = 'rgba(201,168,76,0.9)';
        sel.style.boxShadow = '0 0 0 3px rgba(201,168,76,0.2)';
        setTimeout(() => { sel.style.borderColor = ''; sel.style.boxShadow = ''; }, 800);
        return;
    }

    // Make'teki length() ile birebir eşleşmesi için küçük harfli Make ismi kullan
    const zLen = makeNames[selectedZodiac].length;
    const day = new Date().getDate();
    const multipliers = [7, 13, 19, 25, 31, 37];
    const adds = [3, 5, 8, 11, 14, 17];

    // Make formülüyle birebir: floor(gün * M + uzunluk * A) % 49 + 1
    let numbers = [];
    for (let i = 0; i < 6; i++) {
        let n = (Math.floor(day * multipliers[i] + zLen * adds[i]) % 49) + 1;
        while (numbers.includes(n)) { n = (n % 49) + 1; }
        numbers.push(n);
    }
    numbers.sort((a, b) => a - b);

    const specialIndex = Math.floor(numbers.length / 2);
    container.innerHTML = '';
    label.classList.add('show');
    commentBox.classList.remove('show');

    numbers.forEach((num, index) => {
        setTimeout(() => {
            const ball = document.createElement('div');
            ball.className = `ball ball-bg${index === specialIndex ? ' special' : ''}`;
            ball.innerHTML = `<span>${num}</span>`;
            container.appendChild(ball);
            if (index === numbers.length - 1) {
                commentBox.textContent = comments[selectedZodiac] || 'Bugün kozmik enerjiler seninle. Şans ve başarı yolun açık!';
                commentBox.classList.add('show');
            }
        }, index * 160);
    });
}
