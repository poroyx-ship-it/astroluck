<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroLuck6 | Kozmik Mistik Deneyim</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --gold: #FFD700;
            --premium-gold: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --accent-color: #FFD700;
            --glass-bg: rgba(10, 14, 26, 0.92);
        }

        * { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #020406;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body {
            font-family: 'Poppins', sans-serif;
            width: 100vw;
            color: white;
            text-align: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 200%; height: 200%;
            background: url("https://www.transparenttextures.com/patterns/stardust.png");
            background-size: 400px; 
            animation: moveStars 100s linear infinite;
            opacity: 0.6;
            z-index: -2;
        }

        @keyframes moveStars {
            from { transform: translate(0, 0); }
            to { transform: translate(-500px, -500px); }
        }

        .zodiac-wheel {
            position: fixed;
            width: 130vmin;
            height: 130vmin;
            background: url('https://raw.githubusercontent.com/yigitsener/zodiac-assets/main/zodiac-wheel-gold.png') no-repeat center;
            background-size: contain;
            opacity: 0.12;
            z-index: -1;
            animation: rotateWheel 140s linear infinite;
        }

        @keyframes rotateWheel {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: clamp(30px, 5vh, 50px) 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 50px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
        }

        .logo {
            width: clamp(180px, 35vw, 250px);
            margin: 0 auto;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
        }

        .control-group {
            width: 280px;
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        select {
            width: 100%;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid var(--accent-color);
            background: #000;
            color: #FFF;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-align-last: center;
            outline: none;
            transition: 0.3s;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: var(--premium-gold);
            background-size: 200% auto;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { transform: scale(0.96); }

        #balls-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(5px, 2vw, 12px);
            margin-top: 10px;
            min-height: 70px;
        }

        .ball {
            width: clamp(45px, 11vw, 65px);
            height: clamp(45px, 11vw, 65px);
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #FFF, var(--accent-color) 50%, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: clamp(16px, 4vw, 22px);
            color: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .social {
            margin-top: 10px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social a {
            font-size: 30px;
            margin: 0 15px;
            color: var(--gold);
            transition: 0.3s ease;
        }

        .social a:hover { transform: scale(1.2); }

        #horoscope-comment {
            margin-top: 20px;
            color: #FFD700;
            font-style: italic;
            padding: 15px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            line-height: 1.6;
            font-size: 14px;
        }

        @media (max-height: 720px) {
            .container { gap: 15px; padding: 25px 20px; }
            .logo { width: 150px; }
        }
    </style>
</head>
<body>

<div class="zodiac-wheel"></div>

<div class="container">
    <img src="logo.png" class="logo" alt="Logo">
    
    <div class="control-group">
        <select id="zodiac" onchange="updateTheme()">
            <option value="" disabled selected>Burcunu Seç</option>
            <option value="aries">Koç</option>
            <option value="taurus">Boğa</option>
            <option value="gemini">İkizler</option>
            <option value="cancer">Yengeç</option>
            <option value="leo">Aslan</option>
            <option value="virgo">Başak</option>
            <option value="libra">Terazi</option>
            <option value="scorpio">Akrep</option>
            <option value="sagittarius">Yay</option>
            <option value="capricorn">Oğlak</option>
            <option value="aquarius">Kova</option>
            <option value="pisces">Balık</option>
        </select>

        <button onclick="generateNumbers()">Kozmik Sayıları Göster</button>
    </div>

    <div id="balls-container"></div>
    <div id="horoscope-comment"></div>

    <div class="social">
        <a href="https://www.instagram.com/astroluck.6/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/profile.php?id=61588426601694&sk=followers" target="_blank"><i class="fab fa-facebook"></i></a>
    </div>
</div>

<script>
// 1. RENK PALETİ
const colorPalette = {
    aries: "#FF4136", taurus: "#2ECC40", gemini: "#FFDC00", cancer: "#DDDDDD",
    leo: "#FF851B", virgo: "#85144b", libra: "#F012BE", scorpio: "#FF0000",
    sagittarius: "#B10DC9", capricorn: "#3D9970", aquarius: "#7FDBFF", pisces: "#39CCCC"
};

// 2. TEMA GÜNCELLEME
function updateTheme() {
    const zodiac = document.getElementById("zodiac").value;
    const color = colorPalette[zodiac];
    if(color) {
        document.querySelector('.container').style.borderColor = color;
        document.getElementById("zodiac").style.borderColor = color;
    }
}

// 3. ANA FONKSİYON (SAYI ÜRETİCİ)
async function generateNumbers() {
    console.log("Fonksiyon tetiklendi..."); // Kontrol 1
    const zodiac = document.getElementById("zodiac").value;
    const container = document.getElementById("balls-container");
    const commentBox = document.getElementById("horoscope-comment");
    
    if(!zodiac) {
        alert("Lütfen önce bir burç seçiniz!");
        return;
    }

    // Ekranı temizle
    container.innerHTML = "";
    commentBox.innerText = "Kozmik enerjiler hesaplanıyor...";

    // MATEMATİKSEL HESAPLAMA (Make.com ile birebir aynı)
    const day = new Date().getDate(); 
    const zLen = zodiac.length;
    const multipliers = [7, 13, 19, 25, 31, 37];
    const adds = [3, 5, 8, 11, 14, 17];
    
    let numbers = [];
    for (let i = 0; i < 6; i++) {
        // % 49 + 1 kuralı: 1 ile 49 arası sayı üretir
        let n = ((day * multipliers[i] + zLen * adds[i]) % 49) + 1;
        // Aynı sayı çıkarsa +1 ekleyerek benzersiz yap
        while(numbers.includes(n)) { n = (n % 49) + 1; }
        numbers.push(n);
    }
    numbers.sort((a, b) => a - b);
    console.log("Üretilen Sayılar:", numbers); // Kontrol 2

    // TOPLARI EKRANA ÇİZ
    numbers.forEach((num, index) => {
        setTimeout(() => {
            const ball = document.createElement("div");
            ball.className = "ball";
            ball.innerText = num;
            container.appendChild(ball);
            console.log(num + " numaralı top eklendi."); // Kontrol 3
        }, index * 200);
    });

    // GOOGLE SHEETS YORUMU (Hata alsa bile sayıları bozmaz)
    try {
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSiV2H3ncrcjaAPs4gRVnf9rd5_f3Uek3-Xn_e13kDivFqIQ7dInPM3szayR-EMJa6SIk-6yv8CCQf/pub?gid=0&single=true&output=csv';
        const response = await fetch(csvUrl);
        const data = await response.text();
        const rows = data.split('\n').map(row => row.split(','));
        
        const zodiacNames = {
            aries: "Koç", taurus: "Boğa", gemini: "İkizler", cancer: "Yengeç",
            leo: "Aslan", virgo: "Başak", libra: "Terazi", scorpio: "Akrep",
            sagittarius: "Yay", capricorn: "Oğlak", aquarius: "Kova", pisces: "Balık"
        };

        const targetRow = rows.find(r => r[1] && r[1].trim() === zodiacNames[zodiac]);
        if (targetRow && targetRow[3]) {
            commentBox.innerText = targetRow[3].replace(/"/g, '');
        } else {
            commentBox.innerText = "Yıldızlar bugün şansının açık olduğunu söylüyor!";
        }
    } catch (e) {
        console.log("Yorum çekilemedi ama sayılar tamam.");
        commentBox.innerText = "Şanslı sayıların hazır! Bol şans dileriz.";
    }
</script>

</body>
</html>
