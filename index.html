<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroLuck6</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0a001a;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* yıldız efekti */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:transparent url("https://www.transparenttextures.com/patterns/stardust.png");
  animation:moveStars 60s linear infinite;
  opacity:0.4;
}

@keyframes moveStars{
  from{transform:translate(0,0);}
  to{transform:translate(-500px,-500px);}
}

h1{
  margin-top:80px;
  font-size:55px;
  color:gold;
  text-shadow:0 0 30px gold;
}

.subtitle{
  font-size:20px;
  opacity:0.85;
}

select,button{
  padding:12px 20px;
  border-radius:30px;
  border:none;
  margin:10px;
  font-size:16px;
}

button{
  background:linear-gradient(45deg,#ffd700,#ffae00);
  font-weight:600;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,215,0,0.7);
}

button:hover{
  transform:scale(1.08);
}

#balls-container{
  margin-top:40px;
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.ball{
  width:75px;
  height:75px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#fff8b0,gold 60%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:22px;
  color:#330066;
  box-shadow:0 0 25px gold;
  animation:pulse 2s infinite alternate;
}

@keyframes pulse{
  from{box-shadow:0 0 15px gold;}
  to{box-shadow:0 0 35px #fff;}
}

.social{
  margin-top:60px;
}

.social a{
  font-size:30px;
  margin:0 15px;
  color:gold;
  transition:0.3s;
}

.social a:hover{
  color:white;
}
</style>
</head>
<body>

<h1>AstroLuck6</h1>
<button id="generateBtn">Kozmik Sayıları Göster</button>

<div id="numbers"></div>


<select id="zodiac">
<option value="aries">Koç</option>
<option value="taurus">Boğa</option>
<option value="gemini">İkizler</option>
<option value="cancer">Yengeç</option>
<option value="leo">Aslan</option>
<option value="virgo">Başak</option>
<option value="libra">Terazi</option>
<option value="scorpio">Akrep</option>
<option value="sagittarius">Yay</option>
<option value="capricorn">Oğlak</option>
<option value="aquarius">Kova</option>
<option value="pisces">Balık</option>
</select>

<button onclick="generateNumbers()">Kozmik Sayıları Göster</button>

<div id="balls-container"></div>

<div class="social">
<a href="https://instagram.com/astroluck6" target="_blank"><i class="fab fa-instagram"></i></a>
<a href="https://tiktok.com/@astroluck6" target="_blank"><i class="fab fa-tiktok"></i></a>
<a href="https://twitter.com/astroluck6" target="_blank"><i class="fab fa-x-twitter"></i></a>
</div>

<script>
function getSeed(zodiac){
  const today=new Date();
  let base=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
  let zodiacValue=zodiac.split('').reduce((a,b)=>a+b.charCodeAt(0),0);
  return base+zodiacValue;
}

function seededRandom(seed){
  const x=Math.sin(seed)*10000;
  return x-Math.floor(x);
}

function generateNumbers(){
  const zodiac=document.getElementById("zodiac").value;
  const container=document.getElementById("balls-container");
  container.innerHTML="";
  let seed=getSeed(zodiac);
  let numbers=new Set();
  let i=0;
  while(numbers.size<6){
    let num=Math.floor(seededRandom(seed+i)*49)+1;
    numbers.add(num);
    i++;
  }
  numbers.forEach(n=>{
    let ball=document.createElement("div");
    ball.className="ball";
    ball.textContent=n;
    container.appendChild(ball);
  });
}
</script>

</body>
</html>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const btn = document.getElementById("generateBtn");
  const numbersDiv = document.getElementById("numbers");

  btn.addEventListener("click", function () {
    numbersDiv.innerHTML = "";

    let selectedNumbers = [];

    while (selectedNumbers.length < 6) {
      let num = Math.floor(Math.random() * 49) + 1;
      if (!selectedNumbers.includes(num)) {
        selectedNumbers.push(num);
      }
    }

    selectedNumbers.sort((a, b) => a - b);

    selectedNumbers.forEach(num => {
      let ball = document.createElement("div");
      ball.className = "ball";
      ball.innerText = num;
      numbersDiv.appendChild(ball);
    });
  });

});
</script>
<div class="socials">
  <a href="https://instagram.com/astroluck6" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg">
  </a>

  <a href="https://tiktok.com/@astroluck6" target="_blank">

  </a>

  <a href="https://youtube.com/@astroluck6" target="_blank">

  </a>

}

  filter: invert(1);

.socials img:hover {

}
