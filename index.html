<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroLuck6</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background: radial-gradient(circle at top,#140033,#000);
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* Yıldız efekti */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:stars 60s linear infinite;
opacity:0.4;
}

@keyframes stars{
from{transform:translate(0,0);}
to{transform:translate(-500px,500px);}
}

/* Logo */
.logo{
position:absolute;
top:30px;
left:40px;
font-size:22px;
font-weight:bold;
color:gold;
text-shadow:0 0 15px gold;
}

/* Başlık */
h1{
font-size:80px;
color:gold;
text-shadow:0 0 25px gold,0 0 50px orange;
margin-bottom:40px;
z-index:2;
}

/* Buton */
.glow-btn{
background:gold;
color:black;
border:none;
padding:15px 35px;
border-radius:40px;
font-weight:bold;
font-size:18px;
cursor:pointer;
box-shadow:0 0 15px gold,0 0 30px orange;
transition:0.3s;
margin:10px;
}

.glow-btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px gold,0 0 60px orange;
}

/* Select */
select{
padding:12px 20px;
border-radius:30px;
border:none;
font-size:16px;
margin:10px;
}

/* Sosyal ikonlar */
.social{
position:absolute;
bottom:80px;
display:flex;
gap:40px;
}

.social a{
color:gold;
font-size:28px;
text-decoration:none;
transition:0.3s;
}

.social a:hover{
transform:scale(1.2);
text-shadow:0 0 15px gold;
}
</style>

<!-- Font Awesome -->
<script src="https://kit.fontawesome.com/7d5a1f1b8f.js" crossorigin="anonymous"></script>

</head>
<body>

<div class="logo">AstroLuck6</div>

<h1>AstroLuck6</h1>

<button class="glow-btn" onclick="alert('Kozmik sayı hesaplanıyor...')">
Kozmik Sayıları Göster
</button>

<div>
<select id="burc">
<option>Koç</option>
<option>Boğa</option>
<option>İkizler</option>
<option>Yengeç</option>
<option>Aslan</option>
<option>Başak</option>
<option>Terazi</option>
<option>Akrep</option>
<option>Yay</option>
<option>Oğlak</option>
<option>Kova</option>
<option>Balık</option>
</select>

<button class="glow-btn" onclick="burcSec()">
Kozmik Sayıları Göster
</button>
</div>

<div class="social">
<a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
<a href="https://tiktok.com" target="_blank"><i class="fab fa-tiktok"></i></a>
<a href="https://x.com" target="_blank"><i class="fab fa-x-twitter"></i></a>
</div>

<script>
function burcSec(){
let burc=document.getElementById("burc").value;
alert(burc+" burcu için kozmik sayı hesaplanıyor...");
}
</script>

</body>
</html>
