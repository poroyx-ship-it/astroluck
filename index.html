<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroLuck6</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background: radial-gradient(circle at 50% 20%, #1a0033 0%, #000 70%);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
overflow:hidden;
position:relative;
}

/* yıldız katmanı */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:0.35;
animation:moveStars 120s linear infinite;
}

@keyframes moveStars{
from{transform:translate(0,0);}
to{transform:translate(-800px,800px);}
}

/* üst sol logo */
.logo{
position:absolute;
top:35px;
left:50px;
font-size:26px;
font-weight:700;
color:#FFD700;
text-shadow:0 0 20px #FFD700, 0 0 40px orange;
z-index:2;
}

/* ana başlık */
h1{
font-size:90px;
font-weight:900;
color:#FFD700;
text-shadow:
0 0 20px #FFD700,
0 0 40px #FFD700,
0 0 80px orange;
margin-bottom:50px;
z-index:2;
}

/* buton */
.glow-btn{
background:linear-gradient(45deg,#FFD700,#ffcc00);
border:none;
padding:18px 45px;
border-radius:50px;
font-size:18px;
font-weight:700;
cursor:pointer;
color:black;
box-shadow:
0 0 20px #FFD700,
0 0 50px orange,
0 0 80px orange;
transition:0.3s;
margin:12px;
}

.glow-btn:hover{
transform:scale(1.07);
box-shadow:
0 0 30px #FFD700,
0 0 80px orange,
0 0 120px orange;
}

/* select */
select{
padding:14px 25px;
border-radius:40px;
border:none;
font-size:16px;
margin-right:15px;
}

/* sosyal medya */
.social{
position:absolute;
bottom:90px;
display:flex;
gap:45px;
z-index:2;
}

.social a{
color:#FFD700;
font-size:30px;
transition:0.3s;
}

.social a:hover{
transform:scale(1.3);
text-shadow:0 0 20px #FFD700;
}
</style>

<script src="https://kit.fontawesome.com/7d5a1f1b8f.js" crossorigin="anonymous"></script>

</head>
<body>

<div class="logo">AstroLuck6</div>

<h1>AstroLuck6</h1>

<button class="glow-btn">
Kozmik Sayıları Göster
</button>

<div>
<select id="burc">
<option>Koç</option>
<option>Boğa</option>
<option>İkizler</option>
<option>Yengeç</option>
<option>Aslan</option>
<option>Başak</option>
<option>Terazi</option>
<option>Akrep</option>
<option>Yay</option>
<option>Oğlak</option>
<option>Kova</option>
<option>Balık</option>
</select>

<button class="glow-btn">
Kozmik Sayıları Göster
</button>
</div>

<div class="social">
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-tiktok"></i></a>
<a href="#"><i class="fab fa-x-twitter"></i></a>
</div>

</body>
</html>
