<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroLuck6 | Ultra Premium Experience</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --gold: #FFD700;
            --premium-gold: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --accent-color: #FFD700;
            --glass-bg: rgba(10, 14, 26, 0.85);
        }

        /* Sayfayı %100 her ekrana oturtan ayar */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Kaydırma çubuğunu gizler */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #05070A;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            text-align: center;
        }

        /* Arka Plan Zodiac Wheel */
        .zodiac-wheel {
            position: fixed;
            width: 100vh; /* Ekran yüksekliğine göre oranlanır */
            height: 100vh;
            background: url('https://raw.githubusercontent.com/yigitsener/zodiac-assets/main/zodiac-wheel-gold.png') no-repeat center;
            background-size: contain;
            opacity: 0.12;
            z-index: -1;
            animation: rotateWheel 150s linear infinite;
        }

        @keyframes rotateWheel {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Ana Panel */
        .container {
            width: 90%;
            max-width: 500px; /* Bilgisayarda çok yayılmasını engeller */
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 50px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 220px;
            display: block;
            margin: 0 auto 20px;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4));
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 3px;
            background: var(--premium-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Burç Seçme Alanı - Kısaltıldı */
        .select-wrapper {
            position: relative;
            width: 240px; /* Sabit ve zarif genişlik */
            margin: 0 auto 30px;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 15px;
            border: 2px solid var(--accent-color);
            background: #000;
            color: #FFF;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            text-align-last: center;
            transition: 0.4s;
        }

        /* Kozmik Buton */
        button {
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            background: var(--premium-gold);
            background-size: 200% auto;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
            transition: 0.4s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.5);
        }

        /* Toplar - Tek Sıra */
        #balls-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 10px;
            min-height: 60px; /* Boşken yer kaplaması için */
        }

        .ball {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #FFF, var(--accent-color) 55%, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: #000;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            animation: cosmicPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes cosmicPop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .social {
            margin-top: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .social a {
            font-size: 26px;
            margin: 0 15px;
            color: var(--gold);
            transition: 0.3s;
        }

        .social a:hover { transform: scale(1.2); color: #FFF; }

        /* Tablet ve Mobil için Ekran Uyumu */
        @media (max-width: 600px) {
            .container { padding: 30px 15px; }
            .ball { width: 45px; height: 45px; font-size: 16px; }
            .logo { width: 180px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="zodiac-wheel"></div>

<div class="container">
    <img src="logo.png" class="logo" alt="Logo">
    <h1>AstroLuck6</h1>

    <div class="select-wrapper">
        <select id="zodiac" onchange="updateTheme()">
            <option value="" disabled selected>Burç Seçin</option>
            <option value="aries">Koç</option>
            <option value="taurus">Boğa</option>
            <option value="gemini">İkizler</option>
            <option value="cancer">Yengeç</option>
            <option value="leo">Aslan</option>
            <option value="virgo">Başak</option>
            <option value="libra">Terazi</option>
            <option value="scorpio">Akrep</option>
            <option value="sagittarius">Yay</option>
            <option value="capricorn">Oğlak</option>
            <option value="aquarius">Kova</option>
            <option value="pisces">Balık</option>
        </select>
    </div>

    <button onclick="generateNumbers()">Kozmik Sayıları Göster</button>

    <div id="balls-container"></div>

    <div class="social">
        <a href="https://www.instagram.com/astroluck.6/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/profile.php?id=61588426601694&sk=followers" target="_blank"><i class="fab fa-facebook"></i></a>
    </div>
</div>

<script>
const colorPalette = {
    aries: "#FF4136", taurus: "#2ECC40", gemini: "#FFDC00",
    cancer: "#DDDDDD", leo: "#FF851B", virgo: "#85144b",
    libra: "#F012BE", scorpio: "#FF0000", sagittarius: "#B10DC9",
    capricorn: "#3D9970", aquarius: "#7FDBFF", pisces: "#39CCCC"
};

function updateTheme() {
    const zodiac = document.getElementById("zodiac").value;
    if (zodiac) {
        document.documentElement.style.setProperty('--accent-color', colorPalette[zodiac]);
    }
}

function getSeed(zodiac){
    const today = new Date();
    return today.getFullYear()*10000 + (today.getMonth()+1)*100 + today.getDate() + zodiac.length;
}

function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function generateNumbers(){
    const zodiac = document.getElementById("zodiac").value;
    if(!zodiac) { alert("Burç seçmelisiniz!"); return; }
    
    const container = document.getElementById("balls-container");
    container.innerHTML = "";
    
    let seed = getSeed(zodiac);
    let numbers = new Set();
    let i = 0;
    
    while(numbers.size < 6){
        let num = Math.floor(seededRandom(seed + i) * 49) + 1;
        numbers.add(num);
        i++;
    }
    
    Array.from(numbers).sort((a,b)=>a-b).forEach((n, index) => {
        setTimeout(() => {
            let ball = document.createElement("div");
            ball.className = "ball";
            ball.textContent = n;
            container.appendChild(ball);
        }, index * 120);
    });
}
</script>

</body>
</html>
