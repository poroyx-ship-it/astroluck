<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroLuck6 | Kozmik Şans</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --gold: #FFD700;
            --deep-blue: #0A0E1A;
            --accent-blue: #1A1F35;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #1A1F35, #05070A 80%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        /* Arka Plan Yıldız Efekti */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url("https://www.transparenttextures.com/patterns/stardust.png");
            animation: moveStars 120s linear infinite;
            opacity: 0.4;
            z-index: -1;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 40px 20px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* LOGO */
        .logo {
            width: 140px;
            display: block;
            margin: 0 auto 20px;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5));
            transition: 0.5s ease;
        }
        
        .logo:hover {
            transform: scale(1.05) rotate(5deg);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #FFF, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* SELECT GÜZELLEŞTİRME */
        select {
            padding: 12px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 16px;
            margin-bottom: 25px;
            width: 80%;
            outline: none;
            cursor: pointer;
            appearance: none; /* Standart oku kaldırır */
            text-align: center;
        }

        /* BUTTON GÜZELLEŞTİRME */
        button {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            background-size: 200% auto;
            color: #1a1a1a;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.4s;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4);
        }

        /* TOPLAR (BALLS) */
        #balls-container {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            justify-items: center;
        }

        .ball {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #FFF, #D4AF37 40%, #8A6E2F);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 22px;
            color: #1a1a1a;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.3), 0 10px 20px rgba(255, 215, 0, 0.2);
            animation: cosmicPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cosmicPop {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        /* SOSYAL MEDYA */
        .social {
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .social a {
            font-size: 22px;
            margin: 0 15px;
            color: rgba(255, 215, 0, 0.7);
            text-decoration: none;
            transition: 0.3s;
        }

        .social a:hover {
            color: var(--gold);
            filter: drop-shadow(0 0 10px var(--gold));
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" class="logo" alt="AstroLuck6 Logo">
    <h1>AstroLuck6</h1>

    <select id="zodiac">
        <option value="aries">Koç</option>
        <option value="taurus">Boğa</option>
        <option value="gemini">İkizler</option>
        <option value="cancer">Yengeç</option>
        <option value="leo">Aslan</option>
        <option value="virgo">Başak</option>
        <option value="libra">Terazi</option>
        <option value="scorpio">Akrep</option>
        <option value="sagittarius">Yay</option>
        <option value="capricorn">Oğlak</option>
        <option value="aquarius">Kova</option>
        <option value="pisces">Balık</option>
    </select>

    <br>

    <button onclick="generateNumbers()">Sayıları Oku</button>

    <div id="balls-container"></div>

    <div class="social">
        <a href="https://instagram.com/astroluck6" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://tiktok.com/@astroluck6" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://twitter.com/astroluck6" target="_blank"><i class="fab fa-x-twitter"></i></a>
    </div>
</div>

<script>
/* Seeded Random Mantığını Korumalıyız */
function getSeed(zodiac){
    const today = new Date();
    let base = today.getFullYear()*10000 + (today.getMonth()+1)*100 + today.getDate();
    let zodiacValue = zodiac.split('').reduce((a,b) => a + b.charCodeAt(0), 0);
    return base + zodiacValue;
}

function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function generateNumbers(){
    const zodiac = document.getElementById("zodiac").value;
    const container = document.getElementById("balls-container");
    container.innerHTML = "";
    
    let seed = getSeed(zodiac);
    let numbers = new Set();
    let i = 0;
    
    while(numbers.size < 6){
        let num = Math.floor(seededRandom(seed + i) * 49) + 1;
        numbers.add(num);
        i++;
    }
    
    Array.from(numbers).sort((a,b)=>a-b).forEach((n, index) => {
        setTimeout(() => {
            let ball = document.createElement("div");
            ball.className = "ball";
            ball.textContent = n;
            container.appendChild(ball);
        }, index * 100); // Topların sırayla gelme efekti
    });
}
</script>

</body>
</html>
