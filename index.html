<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    .logo {
    
    }
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#14002b,#070012 70%);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  overflow-x:hidden;
}

/* yıldız efekti */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:url("https://www.transparenttextures.com/patterns/stardust.png");
  animation:moveStars 80s linear infinite;
  opacity:0.25;
  z-index:-1;
}

@keyframes moveStars{
  from{transform:translate(0,0);}
  to{transform:translate(-600px,-600px);}
}

.container{
  width:100%;
  max-width:500px;
}

/* LOGO */
.logo{
  width:180px;
display: block;
margin: 20px auto;
margin-bottom:20px;
  filter:drop-shadow(0 0 20px gold);
}

/* BAŞLIK */
h1{
  font-size:48px;
  color:gold;
  text-shadow:0 0 25px gold;
  margin-bottom:25px;
}

/* SELECT */
select{
  padding:12px 18px;
  border-radius:25px;
  border:none;
  font-size:16px;
  margin-bottom:20px;
}

/* BUTTON */
button{
  padding:14px 30px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ffd700,#ffb700);
  font-weight:600;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,215,0,0.7);
  transition:0.3s;
}

button:hover{
  transform:scale(1.08);
}

/* BALLS */
#balls-container{
  margin-top:30px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.ball{
  width:65px;
  height:65px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#fff8b0,gold 60%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:20px;
  color:#330066;
  box-shadow:0 0 20px gold;
  animation:pop 0.4s ease;
}

@keyframes pop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

/* SOCIAL */
.social{
  margin-top:40px;
}

.social a{
  font-size:26px;
  margin:0 15px;
  color:gold;
  transition:0.3s;
}

.social a:hover{
  color:white;
}
</style>
</head>
<body>

<div class="container">

<!-- LOGO (logo.png) -->
<img src="logo.png" class="logo" alt="logo.png">

<h1>AstroLuck6</h1>

<select id="zodiac">
<option value="aries">Koç</option>
<option value="taurus">Boğa</option>
<option value="gemini">İkizler</option>
<option value="cancer">Yengeç</option>
<option value="leo">Aslan</option>
<option value="virgo">Başak</option>
<option value="libra">Terazi</option>
<option value="scorpio">Akrep</option>
<option value="sagittarius">Yay</option>
<option value="capricorn">Oğlak</option>
<option value="aquarius">Kova</option>
<option value="pisces">Balık</option>
</select>

<br>

<button onclick="generateNumbers()">Kozmik Sayıları Göster</button>

<div id="balls-container"></div>

<div class="social">
<a href="https://instagram.com/astroluck6" target="_blank"><i class="fab fa-instagram"></i></a>
<a href="https://tiktok.com/@astroluck6" target="_blank"><i class="fab fa-tiktok"></i></a>
<a href="https://twitter.com/astroluck6" target="_blank"><i class="fab fa-x-twitter"></i></a>
</div>

</div>

<script>
function getSeed(zodiac){
  const today=new Date();
  let base=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
  let zodiacValue=zodiac.split('').reduce((a,b)=>a+b.charCodeAt(0),0);
  return base+zodiacValue;
}

function seededRandom(seed){
  const x=Math.sin(seed)*10000;
  return x-Math.floor(x);
}

function generateNumbers(){
  const zodiac=document.getElementById("zodiac").value;
  const container=document.getElementById("balls-container");
  container.innerHTML="";
  let seed=getSeed(zodiac);
  let numbers=new Set();
  let i=0;
  while(numbers.size<6){
    let num=Math.floor(seededRandom(seed+i)*49)+1;
    numbers.add(num);
    i++;
  }
  numbers.forEach(n=>{
    let ball=document.createElement("div");
    ball.className="ball";
    ball.textContent=n;
    container.appendChild(ball);
  });
}
</script>

</body>
</html>
